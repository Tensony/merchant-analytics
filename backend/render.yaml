services: 
  - type: web 
    name: merchant-analytics-api 
    runtime: python 
    buildCommand: pip install -r requirements.txt 
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT 
    envVars: 
      - key: SECRET_KEY 
        generateValue: true 
      - key: ALGORITHM 
        value: HS256 
      - key: ACCESS_TOKEN_EXPIRE_MINUTES 
        value: 10080 
      - key: FRONTEND_URL 
        value: https://merchant-analytics.vercel.app 
      - key: DATABASE_URL 
        fromDatabase: 
          name: merchant-analytics-db 
          property: connectionString 
  - type: postgres 
    name: merchant-analytics-db 
    databaseName: merchant_analytics 
    user: merchant_user 
